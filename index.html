<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchDay — Football</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Styles (dans l'ordre de dépendance) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav id="nav">
    <div class="nav-logo" onclick="App.goHome()">
      <div class="nav-logo-ball">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.5"/>
          <path d="M10 4l1.5 4.5H16l-3.5 2.5 1.2 4L10 12.5 6.3 15l1.2-4L4 8.5h4.5z"
                fill="white" opacity=".85"/>
        </svg>
      </div>
      MatchDay
    </div>
    <!-- Injecté par renderNav() -->
    <div class="nav-right" id="nav-right"></div>
  </nav>

  <!-- ── Notifications toast ── -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- ── Portail modal (injecté dynamiquement) ── -->
  <div id="modal-container"></div>

  <!-- ── Contenu principal (injecté dynamiquement) ── -->
  <main id="main"></main>

  <!-- ── Scripts JS (ordre : config → data → utils → composants → app) ── -->
  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/utils/avatars.js"></script>
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/dom.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/components/hero.js"></script>
  <script src="js/components/matchCard.js"></script>
  <script src="js/components/matchModal.js"></script>
  <script src="js/components/playersModal.js"></script>
  <script src="js/components/membersModal.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
